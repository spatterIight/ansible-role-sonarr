---
- name: Check existence of Sonarr systemd service
  ansible.builtin.stat:
    path: "{{ devture_systemd_docker_base_systemd_path }}/{{ sonarr_identifier }}.service"
  register: sonarr_service_stat

- name: Uninstall Sonarr systemd services and files
  when: sonarr_service_stat.stat.exists | bool
  block:
    - name: Ensure Sonarr systemd service is stopped
      ansible.builtin.service:
        name: "{{ sonarr_identifier }}"
        state: stopped
        enabled: false
        daemon_reload: true

    - name: Ensure Sonarr systemd service does not exist
      ansible.builtin.file:
        path: "{{ devture_systemd_docker_base_systemd_path }}/{{ sonarr_identifier }}.service"
        state: absent

    - name: Ensure Sonarr support files do not exist
      ansible.builtin.file:
        path: "{{ sonarr_base_path }}/{{ item }}"
        state: absent
      with_items:
        - env
        - labels

    - name: Ensure Sonarr local data path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ sonarr_data_path }}"
      register: sonarr_data_path_deletion_result
      changed_when: sonarr_data_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure Sonarr base path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ sonarr_base_path }}"
      register: sonarr_base_path_deletion_result
      changed_when: sonarr_base_path_deletion_result.rc == 0
      failed_when: false

- name: Check existence of Sonarr local data path
  ansible.builtin.stat:
    path: "{{ sonarr_data_path }}"
  register: sonarr_data_path_stat

# We just want to notify the user. Deleting data is too destructive.
- name: Inject the message about the remaining Sonarr local data path
  when: sonarr_data_path_stat.stat.exists | bool
  ansible.builtin.set_fact:
    devture_playbook_runtime_messages_list: |
      {{
        devture_playbook_runtime_messages_list | default([])
        +
        [
          "Note: As the local Sonarr instance has been removed, some old data remains in `" + sonarr_data_path + "`. Feel free to delete it."
        ]
      }}
