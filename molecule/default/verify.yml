---
- name: Verify Sonarr systemd service
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait for Sonarr service to become active (up to 180s)
      ansible.builtin.systemd:
        name: sonarr.service
      register: sonarr_service
      until: sonarr_service.status.ActiveState == 'active'
      retries: 36
      delay: 5

    - name: Assert Sonarr service is active
      ansible.builtin.assert:
        that: sonarr_service.status.ActiveState == 'active'
        fail_msg: "sonarr.service not active ({{ sonarr_service.status.ActiveState }})"
        success_msg: "sonarr.service is active"

    - name: Wait for Sonarr HTTP endpoint to respond (up to 10m)
      ansible.builtin.uri:
        url: "http://localhost:8989/"
        method: GET
        status_code: [200, 302]
        follow_redirects: none
      register: sonarr_endpoint
      until: sonarr_endpoint.status in [200, 302]
      retries: 120
      delay: 5

    - name: Assert Sonarr HTTP endpoint responds
      ansible.builtin.assert:
        that: sonarr_endpoint.status in [200, 302]
        fail_msg: "Sonarr did not respond as expected ({{ sonarr_endpoint.status | default('no response') }})"
        success_msg: "Sonarr responded with {{ sonarr_endpoint.status }}"

    - name: Show Sonarr systemd service status summary
      ansible.builtin.debug:
        msg:
          - "Sonarr systemd: {{ sonarr_service.status.ActiveState }}"
          - "Sonarr HTTP: {{ sonarr_endpoint.status }}"
